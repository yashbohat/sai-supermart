{% extends 'base.html' %}
{% block title %}Profile | Sai Supermart{% endblock %}
{% block content %}
<section class="mx-auto max-w-2xl rounded-2xl border border-gray-100 bg-white p-6 shadow-soft">
  <p class="text-sm font-bold uppercase tracking-[0.18em] text-spring">Delivery comfort</p>
  <h1 class="mt-2 text-3xl font-extrabold text-ink">Profile</h1>
  <form method="post" class="mt-6 space-y-4">{% csrf_token %}
    {{ form.as_p }}
    <button class="rounded-xl bg-spring px-5 py-3 font-bold text-white shadow-soft transition hover:bg-springHover hover:shadow-lift">Save profile</button>
  </form>
</section>
{% endblock %}
