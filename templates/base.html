{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Sai Supermart{% endblock %}</title>
  <link rel="icon" type="image/x-icon" href="{% static 'images/logo/favicon.ico' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            spring: '#22C55E',
            springHover: '#16A34A',
            mist: '#F7FAF9',
            ink: '#111827',
            muted: '#6B7280',
            lemon: '#FEF9C3'
          },
          boxShadow: {
            soft: '0 14px 40px rgba(17, 24, 39, 0.08)',
            lift: '0 20px 50px rgba(34, 197, 94, 0.16)'
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="{% static 'css/site.css' %}">
</head>
<body class="min-h-screen overflow-x-hidden bg-white text-ink antialiased">
  {% include 'partials/navbar.html' %}
  {% if messages %}
    <div class="fixed right-4 top-24 z-50 grid gap-3">
      {% for message in messages %}
        <div class="toast-message rounded-2xl border border-gray-100 bg-white px-5 py-4 text-sm font-bold text-ink shadow-lift {% if message.tags == 'error' %}text-red-600{% else %}text-spring{% endif %}">
          {{ message }}
        </div>
      {% endfor %}
    </div>
  {% endif %}
  <main class="mx-auto max-w-7xl px-3 py-6 sm:px-4 md:py-12">
    {% block content %}{% endblock %}
  </main>
  {% include 'partials/footer.html' %}
  <script src="{% static 'js/cart.js' %}"></script>
</body>
</html>
