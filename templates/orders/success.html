{% extends 'base.html' %}
{% block title %}Order Success | Sai Supermart{% endblock %}
{% block content %}
<canvas data-confetti class="pointer-events-none fixed inset-0 z-40"></canvas>
<section class="mx-auto max-w-2xl rounded-2xl border border-gray-100 bg-white p-6 text-center shadow-soft sm:p-10">
  <div class="success-pop mx-auto flex h-32 w-32 items-center justify-center rounded-full bg-green-50">
    <svg class="h-24 w-24" viewBox="0 0 64 64" fill="none">
      <circle class="checkmark-circle" cx="32" cy="32" r="26" stroke="#22C55E" stroke-width="5"/>
      <path class="checkmark-check" d="M20 33.5 28.2 42 45 24" stroke="#22C55E" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <p class="mt-8 text-sm font-bold uppercase tracking-[0.18em] text-spring">Order #{{ order.pk }}</p>
  <h1 class="mt-3 text-3xl font-extrabold text-ink sm:text-5xl">Order Placed Successfully!</h1>
  <p class="mx-auto mt-4 max-w-md text-lg leading-8 text-muted">Your order will be delivered soon</p>
  <div class="mt-8 flex flex-col gap-3 sm:flex-row sm:justify-center">
    <a href="{% url 'products:list' %}" class="rounded-xl bg-spring px-6 py-3 font-bold text-white shadow-soft transition hover:bg-springHover hover:shadow-lift">Continue Shopping</a>
    <a href="{% url 'orders:detail' order.pk %}" class="rounded-xl border border-gray-200 bg-white px-6 py-3 font-bold text-ink transition hover:border-spring hover:text-spring">View Order</a>
  </div>
</section>
{% endblock %}
